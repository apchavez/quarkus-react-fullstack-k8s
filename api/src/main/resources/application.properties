# ---- APPLICATION CONFIG ----
app.name=products-ms-products
app.version=v0.0.1-RELEASE
quarkus.application.name=${app.name}
quarkus.application.version=${app.version}
app.environment=${APP_ENVIRONMENT:local}

# ---- SERVER CONFIG ----
quarkus.http.port=${PORT:8080}
quarkus.smallrye-health.root-path=/api/v1/q/health

# ---- MONGODB CONFIG ----
quarkus.mongodb.devservices.enabled=false
quarkus.mongodb.devservices.image-name=mongo:7.0

# Use environment variables only. Do not expose credentials in source control.
quarkus.mongodb.connection-string=${MONGODB_CONNECTION_STRING:mongodb://localhost:27017}
quarkus.mongodb.database=${MONGODB_DATABASE:products}

quarkus.mongodb.max-pool-size=100
quarkus.mongodb.min-pool-size=0

# ---- REDIS CONFIG ----
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.max-pool-size=6
quarkus.redis.max-waiting-handlers=2048

# ---- CACHE CONFIG (Caffeine) ----
quarkus.cache.caffeine."products-search-cache".expire-after-write=5M
quarkus.cache.caffeine."product-cache".expire-after-write=5M

# ---- LOGGING ----
quarkus.log.level=INFO
quarkus.log.category."com.products".level=DEBUG

# Structured JSON logging: enabled in prod, disabled in dev for readability
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.log.console.json.exception-output-type=formatted
%dev.quarkus.log.console.json=false

# ---- NATIVE BUILD ----
quarkus.native.additional-build-args=--allow-incomplete-classpath

# ---- JACKSON ----
quarkus.jackson.serialization-inclusion=non-null

# ---- METRICS ----
quarkus.micrometer.export.prometheus.path=/api/v1/q/metrics

# ---- TRACING ----
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name},service.version=${quarkus.application.version}

# ---- OPENAPI / SWAGGER UI ----
quarkus.smallrye-openapi.path=/api/v1/q/openapi
quarkus.swagger-ui.path=/api/v1/q/swagger-ui
quarkus.swagger-ui.enable=false
%dev.quarkus.swagger-ui.enable=true
mp.openapi.info.title=Product Management API
mp.openapi.info.version=1.0.0
mp.openapi.info.description=REST API for managing products. Supports CRUD, search by SKU, name prefix search and pagination.

# ---- JWT / SECURITY ----
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=product-api
quarkus.smallrye-jwt.blocking-authentication=true
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=3600

# ---- CORS CONFIG ----
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition

# ---- BANNER ----
quarkus.banner.path=banner.txt
quarkus.banner.enabled=true