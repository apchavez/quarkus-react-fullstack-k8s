name: product-management

services:

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  product-api:
    build: ./api
    environment:
      APP_ENVIRONMENT: local
      PORT: "8080"
      MONGODB_CONNECTION_STRING: mongodb://admin:admin123@mongo:27017
      MONGODB_DATABASE: products
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/q/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  product-web:
    build: ./web

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      product-api:
        condition: service_healthy
      product-web:
        condition: service_started

volumes:
  mongo-data:
