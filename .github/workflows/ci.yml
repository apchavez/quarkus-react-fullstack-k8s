name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — test & coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          scanners: vuln
          exit-code: 1
          ignore-unfixed: true
          format: table

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Test and verify coverage
        working-directory: api
        run: gradle test jacocoTestCoverageVerification

  frontend:
    name: Frontend — typecheck, test & coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: web
        run: pnpm exec tsc --noEmit

      - name: Test and coverage
        working-directory: web
        run: pnpm test:coverage

  e2e:
    name: Frontend — E2E Playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: web
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

  docker-api:
    name: Docker — API
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/apchavez/product-api:latest
            ghcr.io/apchavez/product-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign API image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/apchavez/product-api@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/apchavez/product-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/apchavez/product-api@${{ steps.build.outputs.digest }}
          artifact-name: sbom-api-${{ github.sha }}.spdx.json
          output-file: sbom-api.spdx.json
          format: spdx-json

  docker-web:
    name: Docker — Web
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/apchavez/product-web:latest
            ghcr.io/apchavez/product-web:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign Web image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/apchavez/product-web@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/apchavez/product-web
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/apchavez/product-web@${{ steps.build.outputs.digest }}
          artifact-name: sbom-web-${{ github.sha }}.spdx.json
          output-file: sbom-web.spdx.json
          format: spdx-json

  terraform-validate:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff

      - name: Terraform init (no backend, no cloud credentials needed)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SONAR_ORGANIZATION != ''

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test backend
        working-directory: api
        run: gradle test jacocoTestReport

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Frontend test and coverage
        working-directory: web
        run: pnpm test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
