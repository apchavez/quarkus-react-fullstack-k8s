name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — test & coverage
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Test and verify coverage
        working-directory: product-management-api
        run: gradle test jacocoTestCoverageVerification
        env:
          MONGODB_CONNECTION_STRING: mongodb://localhost:27017
          MONGODB_DATABASE: products_test

  frontend:
    name: Frontend — typecheck, test & coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: product-management-web
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: product-management-web
        run: pnpm exec tsc --noEmit

      - name: Test and coverage
        working-directory: product-management-web
        run: pnpm test:coverage
