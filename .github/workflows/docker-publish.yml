name: Build and Push Product API

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/docker-publish.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        working-directory: api
        run: gradle test

      - name: Verify coverage
        working-directory: api
        run: gradle jacocoTestCoverageVerification

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/apchavez/product-api:latest
            ghcr.io/apchavez/product-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign API image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/apchavez/product-api@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/apchavez/product-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/apchavez/product-api@${{ steps.build.outputs.digest }}
          artifact-name: sbom-api-${{ github.sha }}.spdx.json
          output-file: sbom-api.spdx.json
          format: spdx-json

      - name: Pin image tag in k8s deployment manifest
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          sed -i "s|ghcr.io/apchavez/product-api:.*|ghcr.io/apchavez/product-api:${IMAGE_TAG}|g" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: pin product-api image to sha-${{ github.sha }} [skip ci]"
          git push
