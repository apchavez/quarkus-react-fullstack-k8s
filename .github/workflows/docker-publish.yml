name: Build and Push Product API

on:
  push:
    branches:
      - main
    paths:
      - 'product-management-api/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'product-management-api/**'
      - '.github/workflows/docker-publish.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: product-management-api
        run: gradle test
        env:
          MONGODB_CONNECTION_STRING: mongodb://localhost:27017
          MONGODB_DATABASE: products_test

      - name: Verify coverage
        working-directory: product-management-api
        run: gradle jacocoTestCoverageVerification
        env:
          MONGODB_CONNECTION_STRING: mongodb://localhost:27017
          MONGODB_DATABASE: products_test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Quarkus app
        working-directory: product-management-api
        run: gradle build -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./product-management-api
          push: true
          tags: |
            ghcr.io/apchavez/product-api:latest
            ghcr.io/apchavez/product-api:${{ github.sha }}
